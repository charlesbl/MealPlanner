name: mealplanner-prod

services:
    # ===== Bases de données =====
    postgres-api:
        image: postgres:16-alpine
        container_name: mealplanner-postgres-api
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${API_POSTGRES_USER:-mealplanner_api}
            POSTGRES_PASSWORD: ${API_POSTGRES_PASSWORD:-mealplanner_api}
            POSTGRES_DB: ${API_POSTGRES_DB:-mealplanner_api}
        ports:
            - "${API_POSTGRES_PORT:-5432}:5432"
        volumes:
            - ../mealplanner_pg_api_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - mealplanner-network

    postgres-agent:
        image: postgres:16-alpine
        container_name: mealplanner-postgres-agent
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${AGENT_POSTGRES_USER:-mealplanner_agent}
            POSTGRES_PASSWORD: ${AGENT_POSTGRES_PASSWORD:-mealplanner_agent}
            POSTGRES_DB: ${AGENT_POSTGRES_DB:-mealplanner_agent}
        ports:
            - "${AGENT_POSTGRES_PORT:-5433}:5432"
        volumes:
            - ../mealplanner_pg_agent_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - mealplanner-network

    # ===== API =====
    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        container_name: mealplanner-api
        restart: unless-stopped
        environment:
            NODE_ENV: production
            API_PORT: ${API_PORT:-3000}
            API_DB_URL: ${API_DB_URL:-postgresql://mealplanner_api:mealplanner_api@postgres-api:5432/mealplanner_api}
            JWT_SECRET: ${JWT_SECRET}
        ports:
            - "${API_EXTERNAL_PORT:-3000}:${API_PORT:-3000}"
        depends_on:
            postgres-api:
                condition: service_healthy
        networks:
            - mealplanner-network
        command: ["node", "dist/index.js"]

    # ===== Agent =====
    agent:
        build:
            context: .
            dockerfile: apps/agent/Dockerfile
        container_name: mealplanner-agent
        restart: unless-stopped
        environment:
            NODE_ENV: production
            AGENT_PORT: ${AGENT_PORT:-3001}
            OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
            OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
            AGENT_DB_URL: ${AGENT_DB_URL:-postgresql://mealplanner_agent:mealplanner_agent@postgres-agent:5432/mealplanner_agent}
            API_URL: ${API_URL:-http://api:3000}
            JWT_SECRET: ${JWT_SECRET}
        ports:
            - "${AGENT_EXTERNAL_PORT:-3001}:${AGENT_PORT:-3001}"
        depends_on:
            postgres-agent:
                condition: service_healthy
            api:
                condition: service_started
        networks:
            - mealplanner-network
        command: ["node", "dist/index.js"]

    # ===== Front-end =====
    front:
        build:
            context: .
            dockerfile: apps/front/Dockerfile
            args:
                VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
                VITE_AGENT_URL: ${VITE_AGENT_URL:-http://localhost:3001}
        container_name: mealplanner-front
        restart: unless-stopped
        ports:
            - "${FRONT_PORT:-8080}:80"
        depends_on:
            - api
            - agent
        networks:
            - mealplanner-network

    # ===== Reverse proxy / SSL =====
    caddy:
        image: caddy:2-alpine
        container_name: mealplanner-caddy
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        environment:
            CADDY_DOMAIN: ${CADDY_DOMAIN}
            API_PORT: ${API_PORT:-3000}
            AGENT_PORT: ${AGENT_PORT:-3001}
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - ../mealplanner_caddy_data:/data
            - ../mealplanner_caddy_config:/config
        depends_on:
            - front
            - api
            - agent
        networks:
            - mealplanner-network

networks:
    mealplanner-network:
        driver: bridge
        name: mealplanner-network
